<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Consultorio Médico</title>

    <link
        rel="stylesheet"
        href="css/estilos.css">

</head>

<body>

    <header>

        <h1>Consultorio Médico</h1>

    </header>

    <nav id="menuPrincipal">

        <button onclick="mostrarDoctores()">
            Doctores
        </button>

        <button onclick="mostrarPacientes()">
            Pacientes
        </button>

        <button onclick="mostrarSalas()">
            Salas
        </button>

        <button onclick="mostrarCitas()">
            Citas
        </button>
        
        <button onclick="mostrarUsuarios()">
        Usuarios
        </button>

        <button
        id="btnCerrarSesion"
        onclick="cerrarSesion()">

        Cerrar sesión

        </button>

    </nav>

    <div id="loginContainer" class="card">

    <h2>Iniciar Sesión</h2>

    <br><br>

    <p style="text-align:center">
    ¿No tienes cuenta?

    <a href="#" onclick="mostrarRegistro()">
        Regístrate aquí
    </a>
    </p>

    <label>Usuario</label>

    <input
        id="loginUsuario"
        type="text">

    <label>Contraseña</label>

    <input
        id="loginPassword"
        type="password">

    <br><br>

    <button
        class="guardar"
        onclick="login()">

        Iniciar sesión

    </button>

</div>

<div id="registroContainer" class="card" style="display:none;">

    <h2>Registrar Usuario</h2>

    <label>Nombre</label>
    <input
        id="registroNombre"
        type="text">

    <label>Usuario</label>
    <input
        id="registroUsuario"
        type="text">

    <label>Contraseña</label>
    <input
        id="registroPassword"
        type="password">

    <br><br>

    <button
        class="guardar"
        onclick="registrarUsuario()">

        Registrarme

    </button>

    <br><br>

    <p style="text-align:center">

        ¿Ya tienes cuenta?

        <a href="#" onclick="mostrarLogin()">

            Iniciar sesión

        </a>

    </p>

</div>

    <main id="contenido">

    <h2>Seleccione un módulo</h2>

    </main>

    <script src="js/api.js"></script>

    <script src="js/doctores.js"></script>

    <script src="js/pacientes.js"></script>

    <script src="js/salas.js"></script>

    <script src="js/citas.js"></script>

    <script src="js/login.js"></script>

    <script src="js/usuarios.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
